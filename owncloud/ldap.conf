# Configuración global del cliente OpenLDAP que usa PHP dentro del
# contenedor de OwnCloud para conectar a OpenLDAP por LDAPS.
#
# Se monta como /etc/ldap/ldap.conf dentro del contenedor. Se necesita
# apuntar TLS_CACERT a la CA del proyecto y exigir verificación del
# servidor para que el bind contra ldaps://openldap:636 valide la
# cadena de certificación.

TLS_CACERT /etc/ssl/certs/otp-secured-cloud-ca.crt
TLS_REQCERT demand
