# Configuración de privacyIDEA para el proyecto otp-secured-cloud.
#
# Los secretos (PI_PEPPER, SECRET_KEY) se inyectan desde variables de
# entorno; NO se deben hardcodear aquí. Todo el estado persistente vive
# bajo /data, que se monta como volumen Docker.

import os

# Secretos criptográficos requeridos por privacyIDEA.
PI_PEPPER = os.environ['PI_PEPPER']
SECRET_KEY = os.environ['PI_SECRET_KEY']

# Base de datos: SQLite dentro del volumen de datos. Para un entorno
# real se usaría PostgreSQL o MariaDB; en este laboratorio académico
# SQLite es suficiente y simplifica el despliegue.
SQLALCHEMY_DATABASE_URI = 'sqlite:////data/pi.db'
SQLALCHEMY_ENGINE_OPTIONS = {
    'pool_recycle': 7200,
}

# Llave simétrica para cifrado en reposo de secretos de tokens.
PI_ENCFILE = '/data/enckey'

# Par de llaves usadas para firmar los registros de auditoría.
PI_AUDIT_KEY_PRIVATE = '/data/private.pem'
PI_AUDIT_KEY_PUBLIC = '/data/public.pem'

# Bitácora de auditoría y logging aplicativo.
PI_LOGFILE = '/var/log/privacyidea/privacyidea.log'
PI_LOGLEVEL = 20  # INFO

# HSM por defecto: usa PI_ENCFILE. Sin módulo HSM externo.
PI_HSM = 'default'
