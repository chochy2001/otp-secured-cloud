name: otp-secured-cloud

services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: otpsec-openldap
    hostname: openldap
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION}"
      LDAP_DOMAIN: "${LDAP_DOMAIN}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      LDAP_CONFIG_PASSWORD: "${LDAP_CONFIG_PASSWORD}"
      LDAP_RFC2307BIS_SCHEMA: "true"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
      # TLS habilitado con certificados de la CA del proyecto.
      # Los certs vienen montados desde ../certs y los nombres de archivo
      # se le indican al contenedor con las variables LDAP_TLS_*_FILENAME.
      LDAP_TLS: "true"
      LDAP_TLS_CRT_FILENAME: "openldap.crt"
      LDAP_TLS_KEY_FILENAME: "openldap.key"
      LDAP_TLS_CA_CRT_FILENAME: "ca.crt"
      LDAP_TLS_VERIFY_CLIENT: "never"
      # ENFORCE=false permite mantener LDAP plano en 389 durante la
      # transición. Los clientes nuevos deben preferir LDAPS en 6636.
      LDAP_TLS_ENFORCE: "false"
    command: ["--copy-service"]
    ports:
      # 389: LDAP plano, se mantiene durante la transición a TLS para
      #      no romper integraciones aún sin actualizar.
      # 6636 -> 636: LDAPS, lo que recomendamos usar de aquí en adelante.
      - "389:389"
      - "6636:636"
    volumes:
      - ../ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
      - ../certs:/container/service/slapd/assets/certs:ro
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - otpsec
    restart: unless-stopped

  privacyidea:
    build:
      context: ../privacyidea
      args:
        PRIVACYIDEA_VERSION: "3.10.2"
    container_name: otpsec-privacyidea
    hostname: privacyidea
    depends_on:
      - openldap
    environment:
      PI_ADMIN_USERNAME: "${PI_ADMIN_USERNAME}"
      PI_ADMIN_PASSWORD: "${PI_ADMIN_PASSWORD}"
      PI_PEPPER: "${PI_PEPPER}"
      PI_SECRET_KEY: "${PI_SECRET_KEY}"
    ports:
      # HTTPS solamente. El plain HTTP en 8080 se elimina con esta fase.
      - "8443:8443"
    volumes:
      - privacyidea_data:/data
      # Solo se montan los archivos necesarios, en lugar del directorio
      # completo, para que el contenedor no vea el resto de los certs.
      - ../certs/privacyidea.crt:/etc/privacyidea/ssl/server.crt:ro
      - ../certs/privacyidea.key:/etc/privacyidea/ssl/server.key:ro
      - ../certs/ca.crt:/etc/privacyidea/ssl/ca.crt:ro
    networks:
      - otpsec
    restart: unless-stopped

  owncloud-db:
    image: mariadb:10.11
    container_name: otpsec-owncloud-db
    hostname: owncloud-db
    environment:
      MYSQL_ROOT_PASSWORD: "${OC_DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: owncloud
      MYSQL_USER: owncloud
      MYSQL_PASSWORD: "${OC_DB_PASSWORD}"
    command:
      - --max-allowed-packet=128M
      - --innodb-log-file-size=64M
    volumes:
      - owncloud_db_data:/var/lib/mysql
    networks:
      - otpsec
    restart: unless-stopped

  owncloud-redis:
    image: redis:7-alpine
    container_name: otpsec-owncloud-redis
    hostname: owncloud-redis
    networks:
      - otpsec
    restart: unless-stopped

  owncloud-server:
    image: owncloud/server:10.15
    container_name: otpsec-owncloud-server
    hostname: owncloud-server
    depends_on:
      - owncloud-db
      - owncloud-redis
      - openldap
    environment:
      OWNCLOUD_DOMAIN: "localhost:9443"
      OWNCLOUD_TRUSTED_DOMAINS: "localhost,owncloud-server,owncloud-proxy"
      OWNCLOUD_DB_TYPE: mysql
      OWNCLOUD_DB_NAME: owncloud
      OWNCLOUD_DB_USERNAME: owncloud
      OWNCLOUD_DB_PASSWORD: "${OC_DB_PASSWORD}"
      OWNCLOUD_DB_HOST: owncloud-db
      OWNCLOUD_REDIS_ENABLED: "true"
      OWNCLOUD_REDIS_HOST: owncloud-redis
      OWNCLOUD_ADMIN_USERNAME: "${OC_ADMIN_USERNAME}"
      OWNCLOUD_ADMIN_PASSWORD: "${OC_ADMIN_PASSWORD}"
      OWNCLOUD_MYSQL_UTF8MB4: "true"
      LDAPTLS_REQCERT: demand
      # OwnCloud está detrás de Caddy haciendo TLS termination, hay que
      # decirle que la URL pública es HTTPS para que genere enlaces
      # correctos.
      OWNCLOUD_OVERWRITE_PROTOCOL: https
    volumes:
      - owncloud_data:/mnt/data
      # CA local montada para que el backend LDAP pueda validar LDAPS
      # contra OpenLDAP cuando se configure user_ldap.
      - ../certs/ca.crt:/usr/local/share/ca-certificates/otp-secured-cloud-ca.crt:ro
      - ../owncloud/10-trust-project-ca.sh:/etc/entrypoint.d/10-trust-project-ca.sh:ro
    networks:
      - otpsec
    restart: unless-stopped

  owncloud-proxy:
    image: caddy:2-alpine
    container_name: otpsec-owncloud-proxy
    hostname: owncloud-proxy
    depends_on:
      - owncloud-server
    ports:
      - "9443:9443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../certs/owncloud.crt:/etc/caddy/certs/owncloud.crt:ro
      - ../certs/owncloud.key:/etc/caddy/certs/owncloud.key:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - otpsec
    restart: unless-stopped

volumes:
  ldap_data:
  ldap_config:
  privacyidea_data:
  owncloud_data:
  owncloud_db_data:
  caddy_data:
  caddy_config:

networks:
  otpsec:
    driver: bridge
